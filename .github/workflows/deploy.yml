name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install and build Quartz
        working-directory: blog
        run: |
          npm ci
          node ./quartz/bootstrap-cli.mjs build -o ../_site/blog

      - name: Copy static files
        run: |
          cp index.html _site/
          cp design-tokens.json _site/
          cp -r assets _site/
          mkdir -p _site/projects
          cp projects/index.html _site/projects/

      - name: Verify Pages output
        run: |
          test -f _site/index.html
          test -f _site/blog/index.html
          test -f _site/projects/index.html
          find _site -maxdepth 2 -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
